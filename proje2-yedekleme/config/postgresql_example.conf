# postgresql_example.conf — WAL ve Yedekleme Yapılandırması
# Proje 2: Veritabanı Yedekleme ve Felaketten Kurtarma Planı
#
# KURULUM:
#   1. postgresql.conf dosyanızın yerini bulun:
#      sudo -u postgres psql -c "SHOW config_file;"
#
#   2. Bu ayarları mevcut dosyanın sonuna ekleyin:
#      sudo bash -c "cat proje2-yedekleme/config/postgresql_example.conf \
#              >> /var/lib/postgres/data/postgresql.conf"
#
#   3. Yeniden başlatın (wal_level ve archive_mode restart gerektirir):
#      sudo systemctl restart postgresql
#
# NOT: (*) ile işaretli ayarlar sunucu yeniden başlatması gerektirir.


# ---------------------------------------------------------------
# WAL (Write-Ahead Logging) — PITR ve arşivleme için
# ---------------------------------------------------------------

# PITR ve replikasyon için gerekli (*)
wal_level = replica

# WAL arşivlemeyi etkinleştirir (*)
archive_mode = on

# WAL dosyalarını arşiv dizinine kopyalar
# %p = kaynak dosya yolu, %f = dosya adı
archive_command = 'cp %p /var/lib/postgres/backups/wal_archive/%f'

# WAL sıkıştırma — disk tasarrufu sağlar
wal_compression = on

# Checkpoint boyut sınırı
max_wal_size = 1GB
min_wal_size = 80MB

# Checkpoint zaman aşımı
checkpoint_timeout = 5min

# Arşivleme için saklanacak WAL miktarı
wal_keep_size = 256MB


# ---------------------------------------------------------------
# Replikasyon — pg_basebackup için
# ---------------------------------------------------------------

# pg_basebackup gönderici sayısı (*)
max_wal_senders = 3

# Replikasyon slotları (opsiyonel)
max_replication_slots = 3


# ---------------------------------------------------------------
# Bellek
# ---------------------------------------------------------------

# Paylaşılan tampon — RAM'in %25'i önerilir
shared_buffers = 256MB

# Tek sorgu çalışma belleği
work_mem = 4MB

# VACUUM ve CREATE INDEX için bakım belleği
maintenance_work_mem = 64MB

# Paralel sorgu işçi sayısı
max_parallel_workers_per_gather = 2


# ---------------------------------------------------------------
# Loglama
# ---------------------------------------------------------------

log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB

# Checkpoint, bağlantı ve DDL logları
log_checkpoints = on
log_connections = on
log_disconnections = on
log_statement = 'ddl'

# 1 saniyeden uzun sorguları logla
log_min_duration_statement = 1000


# ---------------------------------------------------------------
# Bağlantı
# ---------------------------------------------------------------

max_connections = 100
listen_addresses = 'localhost'
port = 5432
password_encryption = scram-sha-256
