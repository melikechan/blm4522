# pg_hba_example.conf — Tam pg_hba.conf Yapılandırması
# Proje 3: Veritabanı Güvenliği ve Erişim Kontrolü
#
# KURULUM:
#   1. pg_hba.conf dosyanızın yerini bulun:
#      sudo -u postgres psql -c "SHOW hba_file;"
#
#   2. Bu dosyayı doğrudan kopyalayın:
#      sudo cp proje3-guvenlik/config/pg_hba_example.conf \
#              /var/lib/postgres/data/pg_hba.conf
#
#   3. postgresql.conf içinde şifre hash yöntemini ayarlayın:
#      password_encryption = scram-sha-256
#
#   4. Yeniden yükleyin:
#      sudo systemctl reload postgresql
#
# FORMAT:
#   TYPE  DATABASE  USER  ADDRESS  METHOD


# ---------------------------------------------------------------
# postgres süper kullanıcısı — peer (şifre gerekmez)
# ---------------------------------------------------------------
local   all             postgres                                    peer


# ---------------------------------------------------------------
# Proje rolleri — scram-sha-256 (trust satırlarından ÖNCE gelir)
# ---------------------------------------------------------------
local   doga_pazarlama  doga_admin                                  scram-sha-256
local   doga_pazarlama  hr_manager                                  scram-sha-256
local   doga_pazarlama  finance_analyst                             scram-sha-256
local   doga_pazarlama  customer_service                            scram-sha-256
local   doga_pazarlama  readonly_user                               scram-sha-256
local   doga_pazarlama  app_service                                 scram-sha-256

host    doga_pazarlama  all                 127.0.0.1/32            scram-sha-256
host    doga_pazarlama  all                 ::1/128                 scram-sha-256


# ---------------------------------------------------------------
# Sistem varsayılanları
# ---------------------------------------------------------------
local   all             all                                         trust
host    all             all             127.0.0.1/32                trust
host    all             all             ::1/128                     trust

local   replication     all                                         trust
host    replication     all             127.0.0.1/32                trust
host    replication     all             ::1/128                     trust


# ---------------------------------------------------------------
# UZAK AĞ bağlantıları (gerekirse etkinleştirin)
# Yalnızca güvenilir dahili ağa izin verin; genel internete asla.
# ---------------------------------------------------------------
# hostssl doga_pazarlama  app_service       192.168.1.0/24          scram-sha-256
